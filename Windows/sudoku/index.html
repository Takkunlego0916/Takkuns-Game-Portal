<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>数独 | Takkun's Game Portal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>数独</h1>
    <div class="controls">
      <label for="difficulty">難易度</label>
      <select id="difficulty">
        <option value="easy">やさしい</option>
        <option value="medium" selected>ふつう</option>
        <option value="hard">むずかしい</option>
      </select>
      <button id="newBtn">新しいパズル</button>
      <button id="solveBtn">解く</button>
      <button id="checkBtn">チェック</button>
      <button id="clearBtn">クリア</button>
    </div>
  </header>

  <main>
    <div id="board" class="board" aria-label="数独ボード"></div>
    <div class="status" id="status"></div>
  </main>

  <footer>
    <small>Copyright(©) 2026 Takkunlego0916. All rights reserved.</small>
  </footer>

  <script src="sudoku.js"></script>
  <script src="script.js"></script>
</body>
</html>
