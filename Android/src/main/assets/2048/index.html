<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>2048 | Takkun's Game Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="container">
  <h1 class="title">2048</h1>

  <div class="scoreboard">
    <div class="score-box">
      <div class="label">スコア</div>
      <div id="score" class="value">0</div>
    </div>
    <div class="score-box">
      <div class="label">ベスト</div>
      <div id="best" class="value">0</div>
    </div>
  </div>

  <div id="board" class="board"></div>

  <div class="controls">
    <button id="new" class="btn-red">New Game</button>
  </div>
</div>

<div id="overlay" class="overlay">
  <div class="panel">
    <h2 id="ov-title"></h2>
    <div id="ov-msg"></div>
    <button id="retry" class="btn-red">リトライ</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
